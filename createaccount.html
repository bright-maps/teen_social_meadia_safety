<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMC Ltd.|Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="login">
  <div class="container">
    <form class="login-form" action="createuser.php" method="POST">
      <h2>Create Account</h2>
      <div class="form-group">
        <input name="firstname" type="text" id="firstName" placeholder="First Name" required>
      </div>
      <div class="form-group">
        <input name="surname" type="text" id="surname" placeholder="Surname" required>
      </div>
      <div class="form-group">
        <input name="email" type="email" id="email" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input name="password" type="password" id="password" placeholder="Password" required>
      </div>
      <div class="form-group">
        <input type="password" name="confirmpassword" placeholder="Confirm Password" required>
      </div>
      <button type="submit">Create</button>
      <a href="login.html">Already Have An Account?</a>
    </form>
  </div>
</body>
</html>
